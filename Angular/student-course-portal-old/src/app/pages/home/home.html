<h1>{{ portalName }}</h1>

<p>
  This portal helps students view available courses and manage their profiles.
</p>

<h3>Student Statistics</h3>

<ul>
  <li>Courses Available: {{ availableCourses }}</li>
  <li>Enrolled: 3</li>
  <li>GPA: 3.8</li>
</ul>

<hr>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">
  Enroll Now
</button>

<p>{{ message }}</p>

<hr>

<label>Search Course:</label>

<input
  type="text"
  [(ngModel)]="searchTerm"
  placeholder="Enter course name">

<p>Searching for: {{ searchTerm }}</p>
