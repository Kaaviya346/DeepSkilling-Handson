<div
  appHighlight
  [appHighlight]="'lightblue'"
  [ngClass]="cardClasses"
  [ngStyle]="{'border-left': '8px solid ' + borderColor}">

  <h3>{{ course.name }}</h3>

  <p><strong>Course ID:</strong> {{ course.id }}</p>

  <p><strong>Course Code:</strong> {{ course.code }}</p>

  <p><strong>Credits:</strong> {{ course.credits | creditLabel }}</p>

  <div [ngSwitch]="course.gradeStatus">

    <p *ngSwitchCase="'passed'">✅ Passed</p>

    <p *ngSwitchCase="'failed'">❌ Failed</p>

    <p *ngSwitchCase="'pending'">⏳ Pending</p>

  </div>

  <button (click)="toggleDetails()">
    {{ isExpanded ? 'Hide Details' : 'Show Details' }}
  </button>

  <div *ngIf="isExpanded">

    <hr>

    <p><strong>Description:</strong> This is a beginner-friendly course.</p>

    <p><strong>Duration:</strong> 8 Weeks</p>

    <p><strong>Instructor:</strong> Angular Team</p>

  </div>

</div>

<hr>
