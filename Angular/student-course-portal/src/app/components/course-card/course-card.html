<div class="course-card">

  <div class="course-header">
    <h3>{{ course.name }}</h3>

    <span class="badge"
      [ngClass]="{
        'passed': course.gradeStatus === 'passed',
        'failed': course.gradeStatus === 'failed',
        'pending': course.gradeStatus === 'pending'
      }">
      {{ course.gradeStatus | uppercase }}
    </span>
  </div>

  <p><strong>Course Code:</strong> {{ course.code }}</p>

  <p><strong>Credits:</strong> {{ course.credits }}</p>

  <div *ngIf="isExpanded">

    <p>
      {{ course.description }}
    </p>

    <p>
      <strong>Instructor:</strong>
      {{ course.instructor }}
    </p>

    <p>
      <strong>Semester:</strong>
      {{ course.semester }}
    </p>

  </div>

  <div class="button-group">

    <button
      *ngIf="!(enrolledIds$ | async)?.includes(course.id)"
      (click)="enroll()">

      Enroll

    </button>

    <button
      *ngIf="(enrolledIds$ | async)?.includes(course.id)"
      (click)="unenroll()">

      Unenroll

    </button>

    <button (click)="toggleDetails()">
      {{ isExpanded ? 'Hide Details' : 'Show Details' }}
    </button>

    <button (click)="viewCourse()">
      View Details
    </button>

  </div>

</div>
