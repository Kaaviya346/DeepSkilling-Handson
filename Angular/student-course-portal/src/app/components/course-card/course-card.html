<button
  *ngIf="!(enrolledIds$ | async)?.includes(course.id)"
  (click)="enroll()">

  Enroll

</button>

<button
  *ngIf="(enrolledIds$ | async)?.includes(course.id)"
  (click)="unenroll()">

  Unenroll

</button>

<button (click)="toggleDetails()">

  {{ isExpanded ? 'Hide Details' : 'Show Details' }}

</button>

<button (click)="viewCourse()">

  View Details

</button>
