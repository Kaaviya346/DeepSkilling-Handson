<h1>Student Course Portal</h1>

<p>
  This portal helps students view available courses and manage their profiles.
</p>

<hr>

<h2>Student Statistics</h2>

<p><strong>Courses Available:</strong> {{ totalCourses }}</p>

<p><strong>Enrolled:</strong> {{ enrolledCourses }}</p>

<p><strong>GPA:</strong> {{ gpa }}</p>

<hr>

<button (click)="enrollNow()">
  Enroll Now
</button>

<hr>

<label>Search Course:</label>

<br><br>

<input
  type="text"
  placeholder="Enter course name"
  [(ngModel)]="searchTerm">

<p>
  Searching for:
  <strong>{{ searchTerm }}</strong>
</p>

<hr>

<app-course-summary-widget></app-course-summary-widget>
