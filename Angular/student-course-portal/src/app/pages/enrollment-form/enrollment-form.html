<h2>Student Enrollment Form</h2>

<form
  #enrollForm="ngForm"
  (ngSubmit)="onSubmit(enrollForm)">

  <!-- Student Name -->

  <label>Student Name</label>

  <input
    type="text"
    name="studentName"
    [(ngModel)]="studentName"
    required
    minlength="3"
    #nameCtrl="ngModel">

  <div *ngIf="nameCtrl.touched && nameCtrl.errors">

    <small *ngIf="nameCtrl.errors['required']">
      Name is required
    </small>

    <small *ngIf="nameCtrl.errors['minlength']">
      Name must be at least 3 characters
    </small>

  </div>

  <br>

  <!-- Email -->

  <label>Email</label>

  <input
    type="email"
    name="studentEmail"
    [(ngModel)]="studentEmail"
    required
    email
    #emailCtrl="ngModel">

  <div *ngIf="emailCtrl.touched && emailCtrl.errors">

    <small *ngIf="emailCtrl.errors['required']">
      Email is required
    </small>

    <small *ngIf="emailCtrl.errors['email']">
      Enter a valid email
    </small>

  </div>

  <br>

  <!-- Course ID -->

  <label>Course ID</label>

  <input
    type="number"
    name="courseId"
    [(ngModel)]="courseId"
    required
    #courseCtrl="ngModel">

  <div *ngIf="courseCtrl.touched && courseCtrl.errors">

    <small *ngIf="courseCtrl.errors['required']">
      Course ID is required
    </small>

  </div>

  <br>

  <!-- Semester -->

  <label>Preferred Semester</label>

  <select
    name="preferredSemester"
    [(ngModel)]="preferredSemester"
    required
    #semesterCtrl="ngModel">

    <option value="">Select Semester</option>
    <option value="Odd">Odd</option>
    <option value="Even">Even</option>

  </select>

  <div *ngIf="semesterCtrl.touched && semesterCtrl.errors">

    <small>Select a semester</small>

  </div>

  <br>

  <!-- Terms -->

  <label>

    <input
      type="checkbox"
      name="agreeToTerms"
      [(ngModel)]="agreeToTerms"
      required
      #termsCtrl="ngModel">

    I Agree to Terms

  </label>

  <div *ngIf="termsCtrl.touched && termsCtrl.errors">

    <small>You must agree to the terms.</small>

  </div>

  <br><br>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

  <button
    type="button"
    (click)="enrollForm.resetForm()">

    Reset

  </button>

</form>

<br>

<div *ngIf="submitted" class="success">

  Enrollment request submitted successfully!

</div>
